server:
  listen: ":8080"
  name: localhost
  read_timeout: 10s
  write_timeout: 10s

  routes:
    - host: "api.example.com"
      upstreams:
        - url: "http://127.0.0.1:9001"
        - url: "http://127.0.0.1:9002"
      strategy: "round_robin"

    - host: "static.example.com"
      upstreams:
        - url: "http://127.0.0.1:9003"
      strategy: "round_robin"